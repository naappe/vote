name: Deploy Vote Operations to GitHub Pages
run-name: Deploy latest Vote operations — ${{ github.sha }}

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build latest static site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Verify exported homepage
        run: test -f out/index.html

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    if: ${{ needs.build.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy latest artifact
        id: deployment
        uses: actions/deploy-pages@v4

  fallback:
    if: ${{ always() && needs.build.result == 'failure' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create safe maintenance page
        run: |
          mkdir -p out
          cat > out/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="refresh" content="60">
            <title>Vote Operations — Updating</title>
            <style>
              *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#eef3f7,#f8fafc);font-family:Arial,sans-serif;color:#17212b}.card{width:min(620px,100%);background:#fff;border:1px solid #d9dee4;border-radius:20px;padding:42px;box-shadow:0 18px 50px rgba(16,24,40,.10);text-align:center}.mark{width:58px;height:58px;margin:0 auto 22px;display:grid;place-items:center;border-radius:16px;background:#1f4f78;color:#fff;font-weight:800}.eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#66717d;font-weight:700}h1{font-size:clamp(28px,5vw,42px);margin:12px 0 14px}p{font-size:17px;line-height:1.6;color:#66717d}.status{display:inline-flex;align-items:center;gap:8px;margin-top:18px;padding:10px 14px;border-radius:999px;background:#eaf1f7;color:#1f4f78;font-weight:700}.dot{width:9px;height:9px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite}@keyframes pulse{50%{opacity:.35}}button{margin-top:24px;border:0;border-radius:10px;background:#1f4f78;color:#fff;padding:12px 20px;font-weight:700;cursor:pointer}
            </style>
          </head>
          <body>
            <main class="card">
              <div class="mark">VO</div>
              <div class="eyebrow">Villimalé 2026</div>
              <h1>System update in progress</h1>
              <p>The latest version could not be published safely. The application is temporarily unavailable while the deployment is corrected.</p>
              <div class="status"><span class="dot"></span>Deployment recovery active</div><br>
              <button onclick="location.reload()">Try again</button>
            </main>
          </body>
          </html>
          HTML
          cp out/index.html out/404.html
          touch out/.nojekyll

      - name: Upload maintenance artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy-fallback:
    if: ${{ needs.fallback.result == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: fallback
    steps:
      - name: Deploy maintenance page
        id: deployment
        uses: actions/deploy-pages@v4
